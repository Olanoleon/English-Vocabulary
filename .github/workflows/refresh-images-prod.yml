name: Refresh Images (Prod)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing DB changes
        type: boolean
        required: true
        default: true
      scope:
        description: Which records to refresh
        type: choice
        required: true
        default: both
        options:
          - both
          - areas
          - sections
      image_library_only:
        description: Force library-only image resolution
        type: boolean
        required: true
        default: true
      unsplash_image_style:
        description: Unsplash style (used only if not library-only)
        type: choice
        required: true
        default: illustration_3d
        options:
          - illustration_3d
          - illustration_flat
          - photo_clean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Opt into the new GitHub Actions JS runtime now.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      IMAGE_LIBRARY_ONLY: ${{ inputs.image_library_only && 'true' || 'false' }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      UNSPLASH_IMAGE_STYLE: ${{ inputs.unsplash_image_style }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug ref and script availability
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));console.log('images:refresh script =', p.scripts?.['images:refresh'] || '<missing>')"
          if [ -f scripts/refresh-images.ts ]; then
            echo "scripts/refresh-images.ts exists"
          else
            echo "scripts/refresh-images.ts missing"
          fi

      - name: Preflight secret checks
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing required secret: PROD_DATABASE_URL"
            exit 1
          fi

      - name: Run image refresh
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

          ARGS="--report reports/prod-image-refresh.json"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "${{ inputs.scope }}" = "areas" ]; then
            ARGS="$ARGS --areas-only"
          elif [ "${{ inputs.scope }}" = "sections" ]; then
            ARGS="$ARGS --sections-only"
          fi

          set +e
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));process.exit(p.scripts && p.scripts['images:refresh'] ? 0 : 1)"
          HAS_NPM_SCRIPT=$?
          set -e

          set +e
          if [ "${HAS_NPM_SCRIPT}" = "0" ]; then
            echo "Running via npm script"
            npm run images:refresh -- $ARGS
            EXIT_CODE=$?
          elif [ -f scripts/refresh-images.ts ]; then
            echo "Running direct script fallback"
            npx tsx scripts/refresh-images.ts $ARGS
            EXIT_CODE=$?
          else
            echo "Neither npm script nor scripts/refresh-images.ts exists in this checkout."
            EXIT_CODE=1
          fi
          set -e

          # Ensure artifact exists even on failure.
          if [ ! -f reports/prod-image-refresh.json ]; then
            cat > reports/prod-image-refresh.json <<EOF
          {
            "error": "images:refresh failed before report write",
            "exitCode": ${EXIT_CODE},
            "scope": "${{ inputs.scope }}",
            "dryRun": ${{ inputs.dry_run && 'true' || 'false' }},
            "imageLibraryOnly": ${{ inputs.image_library_only && 'true' || 'false' }}
          }
          EOF
          fi

          exit ${EXIT_CODE}

      - name: Dump npm debug logs
        if: always()
        shell: bash
        run: |
          if ls /home/runner/.npm/_logs/*-debug-0.log >/dev/null 2>&1; then
            echo "Found npm debug logs:"
            ls -lah /home/runner/.npm/_logs
            for f in /home/runner/.npm/_logs/*-debug-0.log; do
              echo "===== $f ====="
              sed -n '1,240p' "$f"
            done
          else
            echo "No npm debug logs found."
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-image-refresh-report
          path: reports/prod-image-refresh.json
          if-no-files-found: error

      - name: Upload npm logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*-debug-0.log
          if-no-files-found: warn
