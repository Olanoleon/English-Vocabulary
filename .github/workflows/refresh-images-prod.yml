name: Refresh Images (Prod)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing DB changes
        type: boolean
        required: true
        default: true
      scope:
        description: Which records to refresh
        type: choice
        required: true
        default: both
        options:
          - both
          - areas
          - sections
      image_library_only:
        description: Force library-only image resolution
        type: boolean
        required: true
        default: true
      unsplash_image_style:
        description: Unsplash style (used only if not library-only)
        type: choice
        required: true
        default: illustration_3d
        options:
          - illustration_3d
          - illustration_flat
          - photo_clean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Opt into the new GitHub Actions JS runtime now.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      IMAGE_LIBRARY_ONLY: ${{ inputs.image_library_only && 'true' || 'false' }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      UNSPLASH_IMAGE_STYLE: ${{ inputs.unsplash_image_style }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight secret checks
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing required secret: PROD_DATABASE_URL"
            exit 1
          fi

      - name: Run image refresh
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

          ARGS="--report reports/prod-image-refresh.json"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "${{ inputs.scope }}" = "areas" ]; then
            ARGS="$ARGS --areas-only"
          elif [ "${{ inputs.scope }}" = "sections" ]; then
            ARGS="$ARGS --sections-only"
          fi

          set +e
          npm run images:refresh -- $ARGS
          EXIT_CODE=$?
          set -e

          # Ensure artifact exists even on failure.
          if [ ! -f reports/prod-image-refresh.json ]; then
            cat > reports/prod-image-refresh.json <<EOF
          {
            "error": "images:refresh failed before report write",
            "exitCode": ${EXIT_CODE},
            "scope": "${{ inputs.scope }}",
            "dryRun": ${{ inputs.dry_run && 'true' || 'false' }},
            "imageLibraryOnly": ${{ inputs.image_library_only && 'true' || 'false' }}
          }
          EOF
          fi

          exit ${EXIT_CODE}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-image-refresh-report
          path: reports/prod-image-refresh.json
          if-no-files-found: error
