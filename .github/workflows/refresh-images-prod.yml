name: Refresh Images (Prod)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing DB changes"
        type: boolean
        required: true
        default: true
      scope:
        description: "Which records to refresh"
        type: choice
        required: true
        default: both
        options:
          - both
          - areas
          - sections
      image_library_only:
        description: "Force library-only image resolution"
        type: boolean
        required: true
        default: true
      unsplash_image_style:
        description: "Unsplash style (used only if not library-only)"
        type: choice
        required: true
        default: cartoon
        options:
          - cartoon
          - illustration_flat
          - illustration_3d
          - photo_clean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      # IMAGE_LIBRARY_ONLY expects "true"/"false" as string
      IMAGE_LIBRARY_ONLY: ${{ inputs.image_library_only && 'true' || 'false' }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      UNSPLASH_IMAGE_STYLE: ${{ inputs.unsplash_image_style }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run image refresh
        shell: bash
        run: |
          set -euo pipefail

          ARGS="--report reports/prod-image-refresh.json"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "${{ inputs.scope }}" = "areas" ]; then
            ARGS="$ARGS --areas-only"
          elif [ "${{ inputs.scope }}" = "sections" ]; then
            ARGS="$ARGS --sections-only"
          fi

          echo "Running: npm run images:refresh -- $ARGS"
          npm run images:refresh -- $ARGS

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-image-refresh-report
          path: reports/prod-image-refresh.json
          if-no-files-found: warn
